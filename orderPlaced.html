<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ORDER PLACED | E-COMMERCE WEBSITE</title>
  <link rel="icon" href="https://yt3.ggpht.com/a/AGF-l78km1YyNXmF0r3-0CycCA0HLA_i6zYn_8NZEg=s900-c-k-c0xffffffff-no-rj-mo" type="image/gif" sizes="16x16">
  <script src="https://kit.fontawesome.com/4a3b1f73a2.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Lato&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/orderPlaced.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header-section"></div>

  <!-- ORDER PLACED -->
  <div id="orderContainer">
    <div id="check"><i class="fas fa-check-circle"></i></div>
    <div id="aboutCheck">
      <h1>Order Placed Successfully!</h1>
      <p>We've sent you an email with the Order details.</p>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-section"></div>

  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(d => document.getElementById('header-section').innerHTML = d);

    fetch('footer.html')
      .then(r => r.text())
      .then(d => document.getElementById('footer-section').innerHTML = d);
  </script>

  <script src="orderPlaced.js"></script>
</body>
</html>
