<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>E-COMMERCE WEBSITE</title>
  <link rel="icon" href="https://yt3.ggpht.com/a/AGF-l78km1YyNXmF0r3-0CycCA0HLA_i6zYn_8NZEg=s900-c-k-c0xffffffff-no-rj-mo" type="image/gif" sizes="16x16">
  <script src="https://kit.fontawesome.com/4a3b1f73a2.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Lato&display=swap" rel="stylesheet">
  <script src="js/jQuery3.4.1.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick-theme.min.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header-section"></div>

  <!-- SLIDER -->
  <div id="slider-section"></div>

  <!-- CONTENT -->
  <div id="content-section"></div>

  <!-- FOOTER -->
  <div id="footer-section"></div>

  <!-- Slick JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"></script>

  <script>
    // ✅ STEP 1: Load Header
    fetch('header.html')
      .then(r => r.text())
      .then(d => {
        document.getElementById('header-section').innerHTML = d;
      });

    // ✅ STEP 2: Load Slider, then init Slick
    fetch('slider.html')
      .then(r => r.text())
      .then(d => {
        document.getElementById('slider-section').innerHTML = d;
        setTimeout(() => {
          $('#containerSlider').slick({
            dots: true,
            infinite: true,
            slidesToShow: 1,
            slidesToScroll: 1,
            autoplay: true,
            autoplaySpeed: 1500,
          });
        }, 300);
      });

    // ✅ STEP 3: Load Content, then load content.js
    fetch('content.html')
      .then(r => r.text())
      .then(d => {
        document.getElementById('content-section').innerHTML = d;
        let script = document.createElement('script');
        script.src = 'content.js';
        document.body.appendChild(script);
      });

    // ✅ STEP 4: Load Footer
    fetch('footer.html')
      .then(r => r.text())
      .then(d => {
        document.getElementById('footer-section').innerHTML = d;
      });
  </script>

</body>
</html>
